name: Build and Release Addons

on:
  push:

jobs:
  build-stub-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GDExtension headers
        run: |
          mkdir -p .tmp/gdextension
          curl -fsSL \
            https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h \
            -o .tmp/gdextension/gdextension_interface.h

      - name: Build Linux x64 stub
        run: |
          mkdir -p dist
          cc -std=c11 -Wall -Wextra -shared -fPIC \
            -I .tmp/gdextension \
            Generated/GodotApplePluginsStub/godot_apple_plugins_stub.c \
            -o dist/godot_apple_plugins_stub.linux.x86_64.so

      - name: Upload Linux x64 stub
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-stub-linux-x64
          path: dist/godot_apple_plugins_stub.linux.x86_64.so
          if-no-files-found: error

  build-stub-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GDExtension headers
        run: |
          mkdir -p .tmp/gdextension
          curl -fsSL \
            https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h \
            -o .tmp/gdextension/gdextension_interface.h

      - name: Build Linux ARM64 stub
        run: |
          mkdir -p dist
          cc -std=c11 -Wall -Wextra -shared -fPIC \
            -I .tmp/gdextension \
            Generated/GodotApplePluginsStub/godot_apple_plugins_stub.c \
            -o dist/godot_apple_plugins_stub.linux.arm64.so

      - name: Upload Linux ARM64 stub
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-stub-linux-arm64
          path: dist/godot_apple_plugins_stub.linux.arm64.so
          if-no-files-found: error

  build-stub-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GDExtension headers
        run: |
          New-Item -ItemType Directory -Force -Path .tmp/gdextension | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h" `
            -OutFile ".tmp/gdextension/gdextension_interface.h"

      - name: Build Windows x64 stub
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq delims=" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find Common7\Tools\VsDevCmd.bat`) do set "VSDEVCMD=%%i"
          if not defined VSDEVCMD exit /b 1
          call "%VSDEVCMD%" -arch=x64
          cl /std:c11 /W4 /LD /I .tmp\gdextension Generated\GodotApplePluginsStub\godot_apple_plugins_stub.c /link /OUT:dist\godot_apple_plugins_stub.windows.x86_64.dll

      - name: Upload Windows x64 stub
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-stub-windows-x64
          path: dist/godot_apple_plugins_stub.windows.x86_64.dll
          if-no-files-found: error

  build-stub-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GDExtension headers
        run: |
          New-Item -ItemType Directory -Force -Path .tmp/gdextension | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h" `
            -OutFile ".tmp/gdextension/gdextension_interface.h"

      - name: Build Windows ARM64 stub
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq delims=" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -find Common7\Tools\VsDevCmd.bat`) do set "VSDEVCMD=%%i"
          if not defined VSDEVCMD exit /b 1
          call "%VSDEVCMD%" -arch=arm64 -host_arch=x64
          cl /std:c11 /W4 /LD /I .tmp\gdextension Generated\GodotApplePluginsStub\godot_apple_plugins_stub.c /link /OUT:dist\godot_apple_plugins_stub.windows.arm64.dll

      - name: Upload Windows ARM64 stub
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-stub-windows-arm64
          path: dist/godot_apple_plugins_stub.windows.arm64.dll
          if-no-files-found: error

  package:
    needs:
      - build-stub-linux-x64
      - build-stub-linux-arm64
      - build-stub-windows-x64
      - build-stub-windows-arm64
    runs-on:
      - self-hosted
      - macos
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import Code Signing Certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build xcframework package
        run: make build

      - name: Package for Distribution
        run: make dist

      - name: Download Linux x64 stub
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-stub-linux-x64
          path: addons/GodotApplePlugins/bin

      - name: Download Linux ARM64 stub
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-stub-linux-arm64
          path: addons/GodotApplePlugins/bin

      - name: Download Windows x64 stub
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-stub-windows-x64
          path: addons/GodotApplePlugins/bin

      - name: Download Windows ARM64 stub
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-stub-windows-arm64
          path: addons/GodotApplePlugins/bin

      - name: Sign macOS frameworks
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          # Find signing identity from keychain (first code signing certificate)
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "Using signing identity: $SIGNING_IDENTITY"
          
          # Sign all macOS frameworks
          for fw in addons/*/bin/*.framework; do
            if [[ -d "$fw" ]]; then
              echo "Signing $fw"
              codesign --keychain $RUNNER_TEMP/app-signing.keychain-db --force --options runtime \
                --sign "$SIGNING_IDENTITY" \
                $fw
              echo "Verifying file $signfile"
              codesign --keychain $RUNNER_TEMP/app-signing.keychain-db --verify --verbose $fw
            fi
          done

      - name: Archive addons directory
        run: |
          PACKAGE_NAME="GodotApplePlugins-addons-${GITHUB_SHA}.zip"
          mkdir dist
          mv addons dist
          ditto -c -k --sequesterRsrc --keepParent dist "$PACKAGE_NAME"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

      - name: Notarize
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$PACKAGE_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Publish release
        if: startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.sha }}
          name: Addons build for ${{ github.sha }}
          body: Automated build triggered by ${{ github.ref }}
          files: ${{ env.PACKAGE_NAME }}
