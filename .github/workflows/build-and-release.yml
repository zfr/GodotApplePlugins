name: Build and Release Addons

on:
  push:

jobs:
  package:
    runs-on:
      - self-hosted
      - macos
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import Code Signing Certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build xcframework package
        run: make build

      - name: Check for SwiftSyntax symbols
        run: make check_swiftsyntax

      - name: Check for duplicate runtime symbols
        run: make check_no_runtime_symbols

      - name: Package for Distribution
        run: make dist

      - name: Sign frameworks
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "Using signing identity: $SIGNING_IDENTITY"

          sign_framework() {
            local fw="$1"
            if [[ -d "$fw" ]]; then
              echo "Signing $fw"
              codesign --keychain "$KEYCHAIN_PATH" --force --options runtime \
                --sign "$SIGNING_IDENTITY" \
                "$fw"
              codesign --keychain "$KEYCHAIN_PATH" --verify --verbose "$fw"
            fi
          }

          # Sign standalone macOS frameworks (GodotApplePlugins + SwiftGodotRuntime)
          for fw in addons/*/bin/*.framework; do
            sign_framework "$fw"
          done

          # Sign frameworks inside xcframeworks (iOS + iOS Simulator slices)
          for xcfw in addons/*/bin/*.xcframework; do
            if [[ -d "$xcfw" ]]; then
              for fw in "$xcfw"/*/*.framework; do
                sign_framework "$fw"
              done
            fi
          done

      - name: Archive addons directory
        run: |
          PACKAGE_NAME="GodotApplePlugins-addons-${GITHUB_SHA}.zip"
          mkdir dist
          mv addons dist
          ditto -c -k --sequesterRsrc --keepParent dist "$PACKAGE_NAME"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

      - name: Notarize
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$PACKAGE_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Publish release
        if: startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.sha }}
          name: Addons build for ${{ github.sha }}
          body: Automated build triggered by ${{ github.ref }}
          files: ${{ env.PACKAGE_NAME }}
